
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My 3D Modeling Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1120;
    color:white;
}

header{
    text-align:center;
    padding:40px;
    background:#111827;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

header h1{
    font-size:42px;
}

header p{
    margin-top:10px;
    color:#94a3b8;
}

.topbar{
    display:flex;
    justify-content:center;
    margin:30px;
}

button{
    padding:12px 24px;
    background:#2563eb;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

#portfolio{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    margin-bottom:50px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card-content h3{
    margin-bottom:10px;
}

.card-content p{
    color:#94a3b8;
}

.empty{
    text-align:center;
    width:100%;
    margin-top:60px;
    font-size:22px;
    color:#64748b;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-box{
    width:420px;
    background:#111827;
    padding:25px;
    border-radius:12px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-top:12px;
    background:#1e293b;
    border:none;
    color:white;
    border-radius:6px;
}

textarea{
    resize:none;
    height:100px;
}

.close{
    background:#ef4444;
    margin-top:12px;
}

footer{
    text-align:center;
    padding:20px;
    color:#94a3b8;
}
</style>
</head>

<body>

<header>
    <h1>My 3D Modeling Portfolio</h1>
    <p>Low Poly Models • Roblox Assets • Environment Art • Game Props</p>
</header>

<div class="topbar">
    <button onclick="checkPassword()">+ Add Project</button>
</div>

<div id="portfolio"></div>

<!-- Upload Modal -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h2>Upload New Project</h2>

        <input id="title" placeholder="Project Title">

        <textarea id="desc" placeholder="Project Description"></textarea>

        <input type="file" id="imageFile" accept="image/*">

        <button style="margin-top:15px;" onclick="addProject()">Upload</button>

        <button class="close" onclick="closeModal()">Close</button>
    </div>
</div>

<footer>
© 2026 My Portfolio
</footer>

<script>

let projects = JSON.parse(localStorage.getItem("portfolioProjects")) || [];

function saveProjects(){
    localStorage.setItem("portfolioProjects", JSON.stringify(projects));
}

function renderProjects(){

    let container = document.getElementById("portfolio");

    if(projects.length===0){
        container.innerHTML = '<div class="empty">No projects uploaded yet</div>';
        return;
    }

    container.innerHTML = "";

    projects.forEach(project=>{

        container.innerHTML += `
        <div class="card">
            <img src="${project.image}">
            <div class="card-content">
                <h3>${project.title}</h3>
                <p>${project.desc}</p>
            </div>
        </div>
        `;
    });
}

function checkPassword(){

    let password = prompt("Enter Admin Password");

    if(password === "18118"){
        document.getElementById("modal").style.display = "flex";
    }
    else{
        alert("Wrong Password");
    }
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function addProject(){

    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let file = document.getElementById("imageFile").files[0];

    if(title === "" || desc === "" || !file){
        alert("Fill all fields");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        projects.push({
            title: title,
            desc: desc,
            image: e.target.result
        });

        saveProjects();
        renderProjects();
        closeModal();

        document.getElementById("title").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("imageFile").value = "";
    }

    reader.readAsDataURL(file);
}

renderProjects();

</script>

</body>
</html>
